<!DOCTYPE html>
<html>
<head>
    <title>Attendance Tracker</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <py-config>
    packages = ["numpy", "matplotlib"]
    </py-config>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">
        <h2>Attendance Tracker</h2>

        <label>Select Day</label>
        <select id="day">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
        </select>

        <label>Absences</label>
        <input type="number" id="absences" min="0">

        <button class="submit-btn" py-click="add_data">Submit</button>
        <button class="reset-btn" py-click="reset_data">Reset</button>
    </div>

    <div class="graph-card">
        <h3>Weekly Attendance Graph</h3>
        <div id="plot"></div>
    </div>

</div>

<py-script src="main.py" defer></py-script>

</body>
</html>
